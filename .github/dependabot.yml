version: 2
updates:
  # Keep the workflow's GitHub Actions current (e.g. actions/checkout bumps)
  # so deprecations never accumulate. PRs are auto-merged by
  # .github/workflows/dependabot-automerge.yml, so this stays hands-off.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
